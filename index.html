<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário com Validação</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro</h1>
      <form id="formulario" novalidate>
        <div class="campo">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Digite seu nome" />
          <small class="erro" id="erroNome"></small>
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Digite seu e-mail" />
          <small class="erro" id="erroEmail"></small>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <button type="button" id="toggleSenha">👁️</button>
          <input type="password" id="senha" placeholder="Digite sua senha" />
          <small class="erro" id="erroSenha"></small>
        </div>

        <div class="campo">
          <label for="confirmarSenha">Confirmar senha</label>
          <input
            type="password"
            id="confirmarSenha"
            placeholder="Confirme sua senha"
          />
          <small class="erro" id="erroConfirmarSenha"></small>
        </div>

        <button type="submit">Cadastrar</button>
        <p id="mensagemSucesso"></p>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
